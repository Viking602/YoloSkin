version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: yoloskin-postgres
    environment:
      POSTGRES_USER: skinserver
      POSTGRES_PASSWORD: skinserver
      POSTGRES_DB: skinserver
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U skinserver -d skinserver"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
